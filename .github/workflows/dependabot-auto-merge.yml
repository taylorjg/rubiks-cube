name: Dependabot auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge for Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: dependabot/fetch-metadata@v3
        id: metadata
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide auto-merge eligibility
        id: eligibility
        env:
          ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          if [ "$ECOSYSTEM" = "github_actions" ]; then
            echo "Auto-merge: GitHub Actions update"
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          elif [ "$UPDATE_TYPE" = "version-update:semver-patch" ] || \
               [ "$UPDATE_TYPE" = "version-update:semver-minor" ]; then
            echo "Auto-merge: npm patch/minor update"
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping auto-merge for update type: $UPDATE_TYPE"
            echo "eligible=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Approve eligible updates
        if: steps.eligibility.outputs.eligible == 'true'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.eligibility.outputs.eligible == 'true'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
